<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Forever ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
 
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:linear-gradient(135deg,#ff8fb1,#ffb6d5,#fff0f5);
text-align:center;
color:white;
}

.container{
background:rgba(255,255,255,.15);
backdrop-filter:blur(18px);
padding:45px;
border-radius:30px;
box-shadow:0 20px 40px rgba(0,0,0,.25);
max-width:700px;
animation:pop 1s ease;
}

h1{
font-family:"Great Vibes",cursive;
font-size:70px;
margin-bottom:10px;
text-shadow:0 0 20px hotpink;
}

h2{
font-size:40px;
margin-bottom:20px;
}

p{
font-size:22px;
margin:20px 0;
line-height:1.7;
}

audio{
margin-top:20px;
width:100%;
border-radius:20px;
}

.hearts{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
pointer-events:none;
}

.heart{
position:absolute;
bottom:-50px;
font-size:25px;
animation:float linear infinite;
opacity:.8;
}

@keyframes float{
0%{
transform:translateY(0) scale(.5);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-110vh) scale(1.5);
opacity:0;
}
}

@keyframes pop{
from{transform:scale(.6);opacity:0;}
to{transform:scale(1);opacity:1;}
}
</style>

</head>

<body>

<div class="hearts" id="hearts"></div>

<div class="container">

<h1>❤️ I LOVE YOU ❤️</h1>

<h2>Happy Birthday My Bishkitt 🎂</h2>

<p>

Every smile of yours makes my world brighter. ❤️<br><br>

Thank you for being the most beautiful part of my life. 🌹<br><br>

I promise to stand beside you in every moment.<br><br>

Happy Birthday My Baby ❤️

</p>

<audio controls autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

</div>

<script>

const hearts=document.getElementById("hearts");

for(let i=0;i<60;i++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(15+Math.random()*30)+"px";

h.style.animationDuration=(5+Math.random()*6)+"s";

h.style.animationDelay=Math.random()*5+"s";

hearts.appendChild(h);

}

</script>

</body>
</html>
