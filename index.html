<!DOCTYPE html><html><head><meta charset='UTF-8'>
<title>Bishkitt Birthday</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#ff9ac8,#ffd6e7,#fff5f8);
overflow-x:hidden;
text-align:center;
min-height:100vh;
}

/* Floating Hearts */
body::before{
content:"❤ ❤ ❤ ❤ ❤ ❤ ❤ ❤ ❤";
position:fixed;
top:-20px;
left:0;
width:100%;
font-size:30px;
color:rgba(255,255,255,.5);
animation:fall 12s linear infinite;
pointer-events:none;
}

@keyframes fall{
0%{transform:translateY(-100px);}
100%{transform:translateY(110vh);}
}

h1{
margin:30px 0;
font-size:55px;
color:white;
text-shadow:0 0 20px hotpink;
}

.gallery{
display:flex;
justify-content:center;
align-items:center;
gap:25px;
padding:50px;
flex-wrap:wrap;
}

/* Heart Frame */

.photo{
width:220px;
height:220px;
clip-path:path("M110 200 L15 95 C-10 55 25 10 65 20 C90 25 110 45 110 45 C110 45 130 25 155 20 C195 10 230 55 205 95 Z");
overflow:hidden;
border:6px solid white;
box-shadow:0 0 30px rgba(255,20,147,.5);
animation:float 4s ease-in-out infinite;
transition:.5s;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
}

.photo:hover{
transform:scale(1.1);
}

@keyframes float{
50%{
transform:translateY(-15px);
}
}

input{
padding:15px;
width:280px;
border:none;
border-radius:40px;
font-size:18px;
outline:none;
box-shadow:0 0 20px rgba(255,105,180,.4);
}

button{
padding:15px 35px;
border:none;
border-radius:40px;
background:#ff2d75;
color:white;
font-size:20px;
cursor:pointer;
transition:.4s;
box-shadow:0 0 25px hotpink;
}

button:hover{
transform:scale(1.08);
background:#ff0066;
}</style>
<script>
function checkKey(){
 let k=document.getElementById('key').value;
 if(k==='BISHKITT'){
   location.href='letter.html';
 }else{
   alert('Wrong Key ❤️');
 }
}
</script>
</head><body>
<h1>🎂 Happy Birthday My Bishkitt ❤️</h1>
<div class="gallery">

<div class="photo">
<img src="photo1.jpg">
</div>

<div class="photo">
<img src="photo2.jpg">
</div>

<div class="photo">
<img src="photo3.jpg">
</div>

<div class="photo">
<img src="photo4.jpg">
</div>

<div class="photo">
<img src="photo5.jpg">
</div>

</div>
<h2>Enter Secret Key 🔑</h2>
<input id='key' placeholder='Enter Key'>
<button onclick='checkKey()'>Open Surprise</button>
</body></html>
